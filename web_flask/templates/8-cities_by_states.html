<!DOCTYPE html>
<HTML lang="en">

<HEAD>
    <TITLE>HBNB</TITLE>
</HEAD>

<BODY>
    <h1>States</h1>
    <ul>
        {% for state in states %}
        <li>{{ state.id }} <B>{{ state.name }}</B>
            <ul>
                    {% for city in state.cities %}
                    <li>{{ city.id }} <B>{{ city.name }}</B></li>
                    {% endfor %}
            </ul>
        </li>
        {% endfor %}
    </ul>
</BODY>

</HTML>
